function rr(c,x,y,w,h,r,fill,stroke,lw){
  c.beginPath(); c.moveTo(x+r,y); c.arcTo(x+w,y,x+w,y+h,r); c.arcTo(x+w,y+h,x,y+h,r); c.arcTo(x,y+h,x,y,r); c.arcTo(x,y,x+w,y,r); c.closePath();
  if(fill){c.fillStyle=fill;c.fill();} if(stroke){c.strokeStyle=stroke;c.lineWidth=lw||1;c.stroke();}
}

  if(obucks()<50) return false;

function initAudio(){

// ── Loop generation ───────────────────────────────────────────
function generateAllLoops(){
  const sr=AC.sampleRate, bars=4, bpx=60/BPM, sd=bars*4*bpx; // total loop seconds
  LOOP_SLOTS[0].buf=genKick(sr,bpx,bars);
  LOOP_SLOTS[1].buf=genSnare(sr,bpx,bars);
  LOOP_SLOTS[2].buf=genHihat(sr,bpx,bars);
  LOOP_SLOTS[3].buf=genBass(sr,bpx,bars);
  LOOP_SLOTS[4].buf=genChords(sr,bpx,bars);
  LOOP_SLOTS[5].buf=genMelody(sr,bpx,bars);
  LOOP_SLOTS[6].buf=genVocal(sr,bpx,bars);
  LOOP_SLOTS[7].buf=genDrop(sr,bpx,bars);
  // Beat 2 generated lazily on first switch — not here
}

function emptyBuf(sr,bpx,bars){ return AC.createBuffer(2,Math.ceil(sr*bars*4*bpx),sr); }

function addTone(data,sr,t0,freq,type,dur,amp){
  const s0=Math.floor(t0*sr), sn=Math.floor(dur*sr);
  for(let i=0;i<sn&&s0+i<data.length;i++){
    const t=i/sr, env=Math.exp(-t*8);
    let v=0;
    if(type==='sin') v=Math.sin(2*Math.PI*freq*t);
    else if(type==='saw') v=(((freq*t)%1)*2-1);
    else if(type==='sq')  v=Math.sin(2*Math.PI*freq*t)>0?1:-1;
    data[s0+i]+=v*env*amp;
  }
}
function addNoise(data,sr,t0,dur,flo,fhi,amp){
  const s0=Math.floor(t0*sr), sn=Math.floor(dur*sr);
  for(let i=0;i<sn&&s0+i<data.length;i++){
    const env=Math.exp(-i/sn*10); data[s0+i]+=(Math.random()*2-1)*env*amp;
  }
}

function genKick(sr,bpx,bars){
  const buf=emptyBuf(sr,bpx,bars); const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const hits=[0,10,16,26,32,42,48,58]; // 16th-note positions
  const step=bpx/4;
  hits.forEach(h=>{
    const t=h*step; const sn=Math.floor(0.35*sr);
    for(let i=0;i<sn&&Math.floor(t*sr)+i<L.length;i++){
      const ti=i/sr, freq=120*Math.exp(-ti*18), env=Math.exp(-ti*9);
      const v=Math.sin(2*Math.PI*freq*ti)*env*.9;
      L[Math.floor(t*sr)+i]+=v; R[Math.floor(t*sr)+i]+=v;
    }
  });
  return buf;
}

function genSnare(sr,bpx,bars){
  const buf=emptyBuf(sr,bpx,bars); const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const hits=[8,24,40,56]; const step=bpx/4;
  hits.forEach(h=>{ const t=h*step,s0=Math.floor(t*sr),sn=Math.floor(0.18*sr); for(let i=0;i<sn&&s0+i<L.length;i++){const env=Math.exp(-i/sn*12),v=(Math.random()*2-1)*env*.6+(Math.sin(2*Math.PI*220*i/sr)*Math.exp(-i/sr*30)*.3); L[s0+i]+=v; R[s0+i]+=v;} });
  return buf;
}

function genHihat(sr,bpx,bars){
  const buf=emptyBuf(sr,bpx,bars); const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const step=bpx/4; const total=bars*16;
  for(let h=0;h<total;h+=2){ const t=h*step,s0=Math.floor(t*sr),sn=Math.floor(0.05*sr); for(let i=0;i<sn&&s0+i<L.length;i++){const env=Math.exp(-i/sn*14),v=(Math.random()*2-1)*env*.22; L[s0+i]+=v; R[s0+i]+=v;} }
  return buf;
}

function genBass(sr,bpx,bars){
  const buf=emptyBuf(sr,bpx,bars); const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const notes=[110,110,98,110,110,98,92,110]; const step=bpx/2; // 8th notes
  for(let i=0;i<bars*8;i++){
    const f=notes[i%notes.length],t=i*step,sn=Math.floor(.38*sr),s0=Math.floor(t*sr);
    for(let j=0;j<sn&&s0+j<L.length;j++){const ti=j/sr,env=Math.exp(-ti*5),v=(((f*ti)%1)*2-1)*env*.45; L[s0+j]+=v; R[s0+j]+=v;}
  }
  return buf;
}

function genChords(sr,bpx,bars){
  const buf=emptyBuf(sr,bpx,bars); const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const chords=[[220,277,330],[196,247,294],[220,277,330],[247,311,370]];
  const step=bpx*4; // one per bar
  for(let i=0;i<bars;i++){
    const freqs=chords[i%chords.length],t=i*step,sn=Math.floor(step*sr*.8),s0=Math.floor(t*sr);
    for(let j=0;j<sn&&s0+j<L.length;j++){const ti=j/sr,env=Math.exp(-ti*3); let v=0; freqs.forEach(f=>v+=Math.sin(2*Math.PI*f*ti)); v*=env*.18; L[s0+j]+=v; R[s0+j]+=v;}
  }
  return buf;
}

function genMelody(sr,bpx,bars){
  const buf=emptyBuf(sr,bpx,bars); const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const freqs=[0,st(12),0,st(10),0,st(7),st(10),st(12),st(15),0,st(17),0,st(15),st(12),st(10),0];
  const step=bpx/2;
  for(let i=0;i<bars*16;i++){
    const f=freqs[i%16]; if(!f) continue;
    const t=i*step,sn=Math.floor(step*sr*.7),s0=Math.floor(t*sr);
    for(let j=0;j<sn&&s0+j<L.length;j++){const ti=j/sr,env=Math.exp(-ti*8),v=(Math.sin(2*Math.PI*f*ti)>0?1:-1)*env*.25; L[s0+j]+=v; R[s0+j]+=v;}
  }
  return buf;
}

function genVocal(sr,bpx,bars){
  // Try to load from file; generates formant-like synth if unavailable
  const buf=emptyBuf(sr,bpx,bars); const L=buf.getChannelData(0),R=buf.getChannelData(1);
  // "Hey" formant approximation on beats 1 and 3
  const hits=[0,8,16,24,32,40,48,56]; const step=bpx/4;
  hits.forEach(h=>{ const t=h*step,sn=Math.floor(.18*sr),s0=Math.floor(t*sr); for(let j=0;j<sn&&s0+j<L.length;j++){const ti=j/sr,env=Math.exp(-ti*12); let v=(Math.sin(2*Math.PI*220*ti)+Math.sin(2*Math.PI*880*ti)*.4+Math.sin(2*Math.PI*1760*ti)*.2)*env*.3; L[s0+j]+=v; R[s0+j]+=v;} });
  // Also try to load real vocal sample
  fetch('characters/zen_voice_sample.wav').then(r=>r.arrayBuffer()).then(ab=>AC.decodeAudioData(ab)).then(decoded=>{ LOOP_SLOTS[6].buf=decoded; }).catch(()=>{});
  return buf;
}

function genDrop(sr,bpx,bars){
  // Full beat — mix all elements
  const k=genKick(sr,bpx,bars),s=genSnare(sr,bpx,bars),h=genHihat(sr,bpx,bars),b=genBass(sr,bpx,bars);
  const buf=emptyBuf(sr,bpx,bars);
  [[k,.8],[s,.7],[h,.5],[b,.9]].forEach(([src,gain])=>{
    const L=src.getChannelData(0),R=src.getChannelData(1);
    const dL=buf.getChannelData(0),dR=buf.getChannelData(1);
    for(let i=0;i<L.length;i++){dL[i]+=L[i]*gain;dR[i]+=R[i]*gain;}
  });
  return buf;
}

// ── Beat 2: Eb minor 150 BPM ──────────────────────────────────────────
// Key frequencies (Eb minor)
const Eb2=77.78,Gb2=92.50,Ab2=103.83,Bb2=116.54,Db3=138.59,
      Eb3=155.56,F3=174.61,Gb3=185.00,Ab3=207.65,Bb3=233.08,
      Eb4=311.13,Db4=277.18;

function genKick2(sr,bpx,bars){
  const buf=emptyBuf(sr,bpx,bars); const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const hits=[0,6,10,16,22,26,32,38,42,48,54,58]; const step=bpx/4;
  hits.forEach(h=>{
    const t=h*step,sn=Math.floor(0.38*sr),s0=Math.floor(t*sr);
    for(let i=0;i<sn&&s0+i<L.length;i++){const ti=i/sr,freq=140*Math.exp(-ti*22),env=Math.exp(-ti*10);const v=Math.sin(2*Math.PI*freq*ti)*env*.95;L[s0+i]+=v;R[s0+i]+=v;}
  });
  return buf;
}

function genSnare2(sr,bpx,bars){
  const buf=emptyBuf(sr,bpx,bars); const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const hits=[8,24,40,56],ghosts=[4,12,20,28,36,44,52,60]; const step=bpx/4;
  hits.forEach(h=>{const t=h*step,s0=Math.floor(t*sr),sn=Math.floor(0.22*sr);for(let i=0;i<sn&&s0+i<L.length;i++){const env=Math.exp(-i/sn*10),v=(Math.random()*2-1)*env*.65+(Math.sin(2*Math.PI*200*i/sr)*Math.exp(-i/sr*25)*.3);L[s0+i]+=v;R[s0+i]+=v;}});
  ghosts.forEach(h=>{const t=h*step,s0=Math.floor(t*sr),sn=Math.floor(0.06*sr);for(let i=0;i<sn&&s0+i<L.length;i++){const env=Math.exp(-i/sn*14),v=(Math.random()*2-1)*env*.18;L[s0+i]+=v;R[s0+i]+=v;}});
  return buf;
}

function genHihat2(sr,bpx,bars){
  const buf=emptyBuf(sr,bpx,bars); const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const step=bpx/4; const total=bars*16;
  for(let h=0;h<total;h++){const amp=h%2===0?.28:h%4===2?.18:.10;const t=h*step,s0=Math.floor(t*sr),sn=Math.floor(0.04*sr);for(let i=0;i<sn&&s0+i<L.length;i++){const env=Math.exp(-i/sn*16),v=(Math.random()*2-1)*env*amp;L[s0+i]+=v;R[s0+i]+=v;}}
  return buf;
}

function genBass2(sr,bpx,bars){
  const buf=emptyBuf(sr,bpx,bars); const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const notes=[Eb2,Eb2,Bb2,Eb2,Ab2,Ab2,Gb2,Eb2]; const step=bpx/2;
  for(let i=0;i<bars*8;i++){
    const f=notes[i%notes.length],t=i*step,sn=Math.floor(.42*sr),s0=Math.floor(t*sr);
    for(let j=0;j<sn&&s0+j<L.length;j++){const ti=j/sr,env=Math.exp(-ti*4),v=(((f*ti)%1)*2-1)*env*.5;L[s0+j]+=v;R[s0+j]+=v;}
  }
  return buf;
}

function genChords2(sr,bpx,bars){
  const buf=emptyBuf(sr,bpx,bars); const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const chords=[[Eb3,Gb3,Bb3],[Ab3,Eb3,Ab2],[Gb3,Bb3,Db4],[Bb3,Eb4,Gb3]];
  const step=bpx*4;
  for(let i=0;i<bars;i++){
    const freqs=chords[i%4],t=i*step,sn=Math.floor(step*sr*.75),s0=Math.floor(t*sr);
    for(let j=0;j<sn&&s0+j<L.length;j++){const ti=j/sr,env=Math.exp(-ti*2.5);let v=0;freqs.forEach(f=>v+=Math.sin(2*Math.PI*f*ti)*.06);L[s0+j]+=v*env;R[s0+j]+=v*env;}
  }
  return buf;
}

function genMelody2(sr,bpx,bars){
  const buf=emptyBuf(sr,bpx,bars); const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const mel=[Eb4,0,Db4,Bb3,0,Ab3,Gb3,0,Eb3,0,Ab3,Bb3,0,Db4,Eb4,0];
  const step=bpx/2;
  for(let i=0;i<bars*16;i++){
    const f=mel[i%16];if(!f)continue;
    const t=i*step,sn=Math.floor(step*sr*.6),s0=Math.floor(t*sr);
    for(let j=0;j<sn&&s0+j<L.length;j++){const ti=j/sr,env=Math.exp(-ti*6),v=Math.sin(2*Math.PI*f*ti)*env*.3;L[s0+j]+=v;R[s0+j]+=v;}
  }
  return buf;
}

function genSynth2(sr,bpx,bars){
  // Try to load user's synth sample; fallback to synth pad
  const buf=emptyBuf(sr,bpx,bars);
  fetch('audio/synth_eb_minor.mp3').then(r=>r.arrayBuffer()).then(ab=>AC.decodeAudioData(ab)).then(decoded=>{LOOP_SLOTS2[3].buf=decoded;}).catch(()=>{});
  // Fallback synth pad in Eb minor
  const L=buf.getChannelData(0),R=buf.getChannelData(1);
  const freqs=[Eb3,Gb3,Bb3,Eb4];
  const totalSamples=buf.length;
  for(let j=0;j<totalSamples;j++){
    const ti=j/sr,env=Math.min(ti*4,1)*Math.exp(-ti*.8);
    let v=0; freqs.forEach((f,k)=>v+=Math.sin(2*Math.PI*f*ti+k*.3)*.08);
    L[j]+=v*env; R[j]+=v*env;
  }
  return buf;
}

function genDrop2(sr,bpx,bars){
  // Reuse already-generated buffers instead of regenerating
  const buf=emptyBuf(sr,bpx,bars);
  [[LOOP_SLOTS2[0].buf,.85],[LOOP_SLOTS2[1].buf,.75],[LOOP_SLOTS2[2].buf,.5],[LOOP_SLOTS2[4].buf,.95]].forEach(([src,gain])=>{
    if(!src) return;
    const L=src.getChannelData(0),R=src.getChannelData(1);
    const dL=buf.getChannelData(0),dR=buf.getChannelData(1);
    for(let i=0;i<L.length&&i<dL.length;i++){dL[i]+=L[i]*gain;dR[i]+=R[i]*gain;}
  });
  return buf;
}

let beat2Ready=false;
function generateBeat2Loops(){
  const sr=AC.sampleRate,bpx=60/BPM,bars=4;
  LOOP_SLOTS2[0].buf=genKick2(sr,bpx,bars);
  LOOP_SLOTS2[1].buf=genSnare2(sr,bpx,bars);
  LOOP_SLOTS2[2].buf=genHihat2(sr,bpx,bars);
  LOOP_SLOTS2[3].buf=genSynth2(sr,bpx,bars);
  LOOP_SLOTS2[4].buf=genBass2(sr,bpx,bars);
  LOOP_SLOTS2[5].buf=genChords2(sr,bpx,bars);
  LOOP_SLOTS2[6].buf=genMelody2(sr,bpx,bars);

}

function switchBeat(b){
  if(b===activeBeat) return;

  LOOP_SLOTS.forEach((_,i)=>{ try{if(LOOP_SLOTS[i].playing){LOOP_SLOTS[i].node.stop();}}catch(e){} LOOP_SLOTS[i].playing=false; LOOP_SLOTS[i].node=null; });

function updateDowngradeNodes(){
  const DN_START=90; // seconds before first node
  if(gameT>=DN_START){
    dnTimer++;
    // Interval shrinks from 420 frames (7s) to 90 frames (1.5s) as game progresses
    const interval=Math.max(90,420-Math.floor((gameT-DN_START)/20)*30);
    if(dnTimer>=interval){
      dnTimer=0;
      spawnDowngradeNode();
      if(vel>3) spawnDowngradeNode(); // two at a time at high speed
      if(vel>5) spawnDowngradeNode(); // three at a time
    }
  }
  downgradeNodes=downgradeNodes.filter(d=>d.x>-60&&d.life>0);
  downgradeNodes.forEach(d=>{
    d.x-=d.spd;d.life--;
    players.forEach(p=>{
      if(!p.alive||d.life<=0) return;
      if(Math.abs(d.x-p.x)<26&&Math.abs(d.y-p.y)<26){
        d.life=0;
        if(p.blvl>0){
          const was=BLASTERS[p.blvl].name;
          p.blvl=Math.max(0,p.blvl-1);

          addNotif(`▼ ${was} → ${BLASTERS[p.blvl].name}`,p.x,p.y-38,'#f87171');

          burst(d.x,d.y,'#ef4444',14);
          addNotif('BASIC — WIDE OPEN!',p.x,p.y-38,'#ef4444');
        }
      }
    });
  });
}

const K={}; let touchY=null,touchX=null,touchActive=false;

function gpInput(gidx){
  if(!navigator.getGamepads) return {up:false,down:false,left:false,right:false};
  const gp=navigator.getGamepads()[gidx];
  if(!gp) return {up:false,down:false,left:false,right:false};
  return {
    up:   gp.axes[1]<-0.25||!!(gp.buttons[12]?.pressed),
    down: gp.axes[1]> 0.25||!!(gp.buttons[13]?.pressed),
    left: gp.axes[0]<-0.25||!!(gp.buttons[14]?.pressed),
    right:gp.axes[0]> 0.25||!!(gp.buttons[15]?.pressed),
  };
}
function playerInput(pidx){
  const gp=gpInput(pidx);
  if(pidx===0){
    const mono=gameMode==='1p';
    return {
      up:   K['w']||(mono&&K['arrowup'])   ||gp.up,
      down: K['s']||(mono&&K['arrowdown']) ||gp.down,
      left: K['a']||(mono&&K['arrowleft']) ||gp.left,
      right:K['d']||(mono&&K['arrowright'])||gp.right,
    };
  }
  return {up:K['arrowup']||gp.up,down:K['arrowdown']||gp.down,left:K['arrowleft']||gp.left,right:K['arrowright']||gp.right};
}

function handleTap(cx,cy){
  if(STATE==='intro')       { STATE='start'; return; }
  if(STATE==='start'){
    if(cy>=388&&cy<=440){
      if(cx>=GW/2-215&&cx<=GW/2-25){ gameMode='1p'; STATE='charSelect'; return; }
      if(cx>=GW/2+25&&cx<=GW/2+215){ gameMode='2p'; STATE='p2CharSelect'; return; }
    }
    if(cy>=464&&cy<=502&&cx>=GW/2-140&&cx<=GW/2+140){ initAudio(); stopBGM(); LOOP_SLOTS.forEach((_,i)=>{try{if(LOOP_SLOTS[i].playing&&LOOP_SLOTS[i].node)LOOP_SLOTS[i].node.stop();}catch(e){}LOOP_SLOTS[i].playing=false;LOOP_SLOTS[i].node=null;}); LOOP_SLOTS2.forEach((_,i)=>{try{if(LOOP_SLOTS2[i].playing&&LOOP_SLOTS2[i].node)LOOP_SLOTS2[i].node.stop();}catch(e){}LOOP_SLOTS2[i].playing=false;LOOP_SLOTS2[i].node=null;}); ep1Vid.play(); STATE='episode'; return; }
    return;
  }
  if(STATE==='episode'){
    if(cx>=8&&cx<=108&&cy>=8&&cy<=40){ ep1Vid.pause();ep1Vid.currentTime=0;startBGM();STATE='start'; return; }
    ep1Vid.paused?ep1Vid.play():ep1Vid.pause(); return;
  }
  if(STATE==='p2CharSelect') { STATE='spSettings'; return; }
  if(STATE==='charSelect')   { if(cx<GW/2&&cy>100&&cy<GH-40){selectedChar=0;STATE='spSettings';} if(cx>=GW/2&&cy>100&&cy<GH-40){selectedChar=1;STATE='spSettings';} return; }
  if(STATE==='spSettings')   { handleSettingsTap(cx,cy); return; }
  if(STATE==='playing')      { if(cy>=SP_Y) handleSP404Tap(cx,cy); return; }
  if(STATE==='levelComplete')         { handleLevelCompleteTap(cx,cy); return; }
  if(STATE==='eliminated'||STATE==='lockout') { handleKPTap(cx,cy); return; }
}

function handleSP404Tap(cx,cy){

  if(cy>=SP_Y+44&&cy<=SP_Y+58){

// Pendant shape + symbol for each of the 8 loop slots
const CHAIN_DESIGNS=[
  {shape:'circle',  sym:'⬤', label:'KICK',   col:'#ef4444'},
  {shape:'diamond', sym:'◆', label:'SNARE',  col:'#f97316'},
  {shape:'hex',     sym:'⬡', label:'HIHAT',  col:'#eab308'},
  {shape:'shield',  sym:'≋', label:'BASS',   col:'#8b5cf6'},

  {shape:'note',    sym:'♫', label:'MELODY', col:'#10b981'},
  {shape:'mic',     sym:'●', label:'VOCAL',  col:'#f59e0b'},
  {shape:'crown',   sym:'♛', label:'DROP',   col:'#ec4899'},
];

function pendantPath(shape, r){
  X.beginPath();
  if(shape==='circle'){ X.arc(0,0,r,0,Math.PI*2); }
  else if(shape==='diamond'){ X.moveTo(0,-r);X.lineTo(r*.85,0);X.lineTo(0,r);X.lineTo(-r*.85,0);X.closePath(); }
  else if(shape==='hex'){ for(let i=0;i<6;i++){const a=i/6*Math.PI*2-Math.PI/6;i===0?X.moveTo(Math.cos(a)*r,Math.sin(a)*r):X.lineTo(Math.cos(a)*r,Math.sin(a)*r);}X.closePath(); }
  else if(shape==='shield'){ X.moveTo(-r,-.7*r);X.lineTo(r,-.7*r);X.lineTo(r,.1*r);X.quadraticCurveTo(0,r*1.3,0,r*1.3);X.quadraticCurveTo(-r,.1*r,-r,.1*r);X.closePath(); }
  else if(shape==='star'){ for(let i=0;i<10;i++){const a=i/10*Math.PI*2-Math.PI/2,ri=i%2?r*.42:r;i===0?X.moveTo(Math.cos(a)*ri,Math.sin(a)*ri):X.lineTo(Math.cos(a)*ri,Math.sin(a)*ri);}X.closePath(); }
  else if(shape==='note'){ X.ellipse(0,0,r*.65,r,0,0,Math.PI*2); }
  else if(shape==='mic'){ X.roundRect(-r*.5,-r,r,r*1.8,r*.5); }
  else if(shape==='crown'){ X.moveTo(-r,r*.4);X.lineTo(-r,-.1*r);X.lineTo(-r*.4,r*.4);X.lineTo(0,-r);X.lineTo(r*.4,r*.4);X.lineTo(r,-.1*r);X.lineTo(r,r*.4);X.closePath(); }
}

function drawPendant(cx, cy, idx, unlocked, r=13){
  const d=CHAIN_DESIGNS[idx%8];
  const gold=unlocked?'#f59e0b':'#2a2a2a';
  const goldBright=unlocked?'#fef08a':'#333';
  const accent=unlocked?d.col:'#1a1a1a';
  X.save(); X.translate(cx,cy);
  if(unlocked){X.shadowColor=d.col;X.shadowBlur=16;}
  // Mini chain links above pendant
  for(let i=0;i<5;i++){
    const lx=(i-2)*r*.55,ly=-r*1.6-Math.sin(Math.PI*i/4)*r*.35,horiz=i%2===0;
    X.strokeStyle=gold;X.lineWidth=1.4;X.fillStyle=unlocked?'rgba(245,158,11,.25)':'rgba(30,30,30,.4)';
    X.beginPath();
    horiz?X.ellipse(lx,ly,r*.38,r*.22,0,0,Math.PI*2):X.ellipse(lx,ly,r*.22,r*.38,0,0,Math.PI*2);
    X.fill();X.stroke();
  }
  // Pendant body
  X.fillStyle=gold; X.strokeStyle=goldBright; X.lineWidth=1.5;
  pendantPath(d.shape,r); X.fill(); X.stroke();
  // Accent gem layer
  X.fillStyle=accent+'88';
  pendantPath(d.shape,r*.65); X.fill();
  // Shine highlight
  if(unlocked){X.fillStyle='rgba(255,255,255,.4)';X.beginPath();X.ellipse(-r*.2,-r*.3,r*.3,r*.18,-0.4,0,Math.PI*2);X.fill();}
  // Symbol
  X.shadowBlur=0;X.fillStyle=unlocked?'#fff':'#444';X.font=`bold ${r*.7}px Arial`;X.textAlign='center';X.fillText(d.sym,0,r*.28);
  X.restore();
}

function updateChains(){
  maybeSpawnChain();
  chains=chains.filter(ch=>ch.x>-50&&ch.life>0);
  chains.forEach(ch=>{
    ch.x-=ch.spd; ch.life--;
    const hit=players.find(p=>p.alive&&Math.abs(ch.x-p.x)<30&&Math.abs(ch.y-p.y)<30);
    if(hit){ ch.life=0; collectChain(); }
  });
}

function collectChain(){
  chainsCollected++;
  sfxChain();
  const pc=pchains();
  if(pc<8){
    const next=LOOP_SLOTS.find(s=>!s.unlocked);
    if(next){next.unlocked=true;localStorage.setItem('sb_pchains',pc+1);sfxUnlock();unlockFlash=40;addNotif('🔗 BEAT 1 SLOT UNLOCKED!',GW/2,PLAY_H/2,'#f59e0b');}
  } else {
    const pc2=pchains2();
    if(pc2>=8) return;

}

function drawBoss(){
  if(!boss||!boss.alive) return;
  const bx=boss.x,by=boss.y+Math.sin(boss.phase*.6)*18;
  X.save();X.translate(bx,by);
  // Phone case (outer shell)
  const caseCol=`hsl(${frame*1.2%360},70%,35%)`;
  X.shadowColor=caseCol;X.shadowBlur=28;
  rr(X,-52,-88,104,176,18,caseCol,'#fff',1.5);
  X.shadowBlur=0;
  // Screen body
  rr(X,-42,-78,84,156,10,'#0a0a0a','#333',1);
  // Screen content (animated UI)
  const glassCol=boss.cracked?'rgba(180,220,255,.12)':'rgba(160,210,255,.22)';
  rr(X,-38,-74,76,148,8,glassCol);
  // Animated app icons
  for(let row=0;row<4;row++){for(let col=0;col<3;col++){
    const ix=-26+col*26,iy=-62+row*36;
    const hue=(row*3+col)*40+frame*2;
    rr(X,ix-9,iy-9,18,18,4,`hsla(${hue},80%,55%,.9)`);
  }}
  // Camera bump
  X.fillStyle='#1a1a1a';X.beginPath();X.arc(22,-68,9,0,Math.PI*2);X.fill();
  X.fillStyle='#2a2a3a';X.beginPath();X.arc(22,-68,6,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(255,255,255,.3)';X.beginPath();X.arc(20,-70,2,0,Math.PI*2);X.fill();
  // Screen protector sheen
  rr(X,-38,-74,76,148,8,'','rgba(255,255,255,.08)',1);
  X.strokeStyle='rgba(255,255,255,.15)';X.lineWidth=1;
  X.beginPath();X.moveTo(-30,-72);X.lineTo(-30,70);X.stroke();
  // Cracks when hp < 60%
  if(boss.hp<boss.mhp*.6){
    X.strokeStyle='rgba(255,255,255,.7)';X.lineWidth=1.5;
    X.beginPath();X.moveTo(-10,-40);X.lineTo(20,10);X.lineTo(0,50);X.stroke();
    X.beginPath();X.moveTo(20,10);X.lineTo(36,30);X.stroke();
    X.beginPath();X.moveTo(-5,-20);X.lineTo(-28,20);X.stroke();
  }
  // More cracks when hp < 30%
  if(boss.hp<boss.mhp*.3){
    X.strokeStyle='rgba(255,200,200,.85)';X.lineWidth=1;
    X.beginPath();X.moveTo(-30,-60);X.lineTo(-5,0);X.lineTo(30,40);X.stroke();
    X.beginPath();X.moveTo(10,-70);X.lineTo(-15,-30);X.lineTo(0,20);X.stroke();
    X.beginPath();X.moveTo(-38,30);X.lineTo(-10,60);X.stroke();
    // Red glow
    X.shadowColor='#ef4444';X.shadowBlur=22;
    rr(X,-42,-78,84,156,10,'','#ef444466',2);X.shadowBlur=0;
  }
  // HP bar
  const bw=120,bh=10,bx2=-60,by2=-105;
  rr(X,bx2,by2,bw,bh,3,'rgba(0,0,0,.7)');
  const pct=Math.max(0,boss.hp/boss.mhp);
  const barCol=pct>.5?'#22c55e':pct>.25?'#fbbf24':'#ef4444';
  rr(X,bx2,by2,bw*pct,bh,3,barCol);
  X.strokeStyle='#555';X.lineWidth=1;rr(X,bx2,by2,bw,bh,3,'','#555',1);
  X.fillStyle='#fff';X.font='bold 8px "Courier New"';X.textAlign='center';
  X.fillText(`CASE-BUSTER  LVL ${currentLevel}`,0,by2-4);
  X.restore();
}

function updateBoss(){
  if(!boss||!boss.alive) return;
  boss.phase+=0.035;
  boss.x=Math.max(boss.x-1.2,GW*.58);
  boss.y=PLAY_H/2+Math.sin(boss.phase*.7)*75;
  // Shoot mini-screens at players
  boss.shootTimer++;
  const rate=Math.max(30,60-Math.floor(gameT/30)*3);
  if(boss.shootTimer>=rate){
    boss.shootTimer=0;
    const alive=players.filter(p=>p.alive);
    if(alive.length){
      const tgt=alive[Math.floor(Math.random()*alive.length)];
      const dx=tgt.x-boss.x,dy=tgt.y-boss.y,d=Math.sqrt(dx*dx+dy*dy)||1;
      const spd=4+currentLevel*.5;
      eBullets.push({x:boss.x-50,y:boss.y,vx:dx/d*spd,vy:dy/d*spd,isBoss:true});
      if(boss.hp<boss.mhp*.5){// spread shot at half HP
        eBullets.push({x:boss.x-50,y:boss.y,vx:dx/d*spd+1.5,vy:dy/d*spd-1.5,isBoss:true});
        eBullets.push({x:boss.x-50,y:boss.y,vx:dx/d*spd-1.5,vy:dy/d*spd+1.5,isBoss:true});
      }
    }
  }
  boss.cracked=boss.hp<boss.mhp*.6;
  // Hit detection
  bullets.forEach(b=>{
    if(b.x>boss.x-55&&b.x<boss.x+55&&b.y>boss.y-92&&b.y<boss.y+92){
      boss.hp-=b.dmg;b.x=GW+9999;
      burst(b.x,b.y,b.col,6);
      if(boss.hp<=0) defeatBoss();
    }
  });
}

function defeatBoss(){
  boss.alive=false;
  sfxGlassShatter();
  // Shard burst
  for(let i=0;i<40;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*8+2;
    parts.push({x:boss.x,y:boss.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:70,max:70,col:i%3===0?'#fff':i%3===1?'#60a5fa':'#a78bfa',r:Math.random()*5+1});
  }
  addNotif('💥 SCREEN SHATTERED!',boss.x,boss.y-50,'#fff');
  // Spawn black hole
  setTimeout(()=>{blackHole={x:boss.x,y:boss.y,r:4,pulse:0,active:true};},600);
}

function drawBlackHole(){
  if(!blackHole) return;
  blackHole.r=Math.min(blackHole.r+.55,55);
  blackHole.pulse+=.07;
  const bx=blackHole.x,by=blackHole.y,r=blackHole.r;
  // Outer glow ring
  X.shadowColor='#7c3aed';X.shadowBlur=35;
  const grd=X.createRadialGradient(bx,by,r*.3,bx,by,r*2.2);
  grd.addColorStop(0,'rgba(0,0,0,0)');
  grd.addColorStop(.5,'rgba(88,28,220,.35)');
  grd.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=grd;X.beginPath();X.arc(bx,by,r*2.2,0,Math.PI*2);X.fill();
  // Black core
  X.fillStyle='#000';X.beginPath();X.arc(bx,by,r,0,Math.PI*2);X.fill();
  // Purple/blue event horizon ring
  X.strokeStyle=`hsla(${270+Math.sin(blackHole.pulse)*20},80%,65%,.9)`;
  X.lineWidth=3+Math.sin(blackHole.pulse)*1.5;
  X.beginPath();X.arc(bx,by,r,0,Math.PI*2);X.stroke();
  X.shadowBlur=0;
  // Animated text
  if(Math.floor(frame/18)%2){
    X.fillStyle='#e9d5ff';X.font='bold 10px "Courier New"';X.textAlign='center';
    X.fillText('FLY IN →',bx,by-r-12);
  }
}

function checkBlackHole(){
  if(!blackHole||blackHole.r<20) return;
  players.forEach(p=>{
    if(!p.alive) return;
    if(Math.hypot(p.x-blackHole.x,p.y-blackHole.y)<blackHole.r+10){
      currentLevel++;
      localStorage.setItem('sb_level',currentLevel);
      localStorage.setItem('sb_maxlevel',Math.max(currentLevel,maxLevel()));
      selectedLevel=currentLevel;
      stopBGM();
      LOOP_SLOTS.forEach((_,i)=>stopLoop(i));
      LOOP_SLOTS2.forEach((_,i)=>{try{if(LOOP_SLOTS2[i].playing&&LOOP_SLOTS2[i].node)LOOP_SLOTS2[i].node.stop();}catch(e){}LOOP_SLOTS2[i].playing=false;LOOP_SLOTS2[i].node=null;});
      sfxLevelUp();
      levelCompleteTab='next';
      STATE='levelComplete';
    }
  });
}

function spawnEnemy(){
  const type=Math.floor(Math.random()*3),y=50+Math.random()*(PLAY_H-110);
  const hp=Math.max(1,Math.floor(vel*1.1)*currentLevel);
  enemies.push({x:GW+70,y,type,hp,mhp:hp,spd:Math.min(1.6+vel*.5,12)+Math.random()*2,sT:80+Math.random()*80,phase:Math.random()*Math.PI*2});
}

function update(){
  frame++;gameT=frame/60;vel=1+gameT/25;
  const maxBlvl=Math.max(...players.map(p=>p.blvl));

  // Move & shoot each alive player
  players.forEach((p,pi)=>{
    if(!p.alive) return;
    const inp=playerInput(pi);
    if(inp.up)    p.y=Math.max(35,p.y-p.spd);
    if(inp.down)  p.y=Math.min(PLAY_H-35,p.y+p.spd);
    if(inp.left)  p.x=Math.max(50,p.x-p.spd*.8);
    if(inp.right) p.x=Math.min(GW*.55,p.x+p.spd*.8);
    if(p.inv>0) p.inv--;
    const bl=BLASTERS[p.blvl],rate=bl.rate*p.rateM;
    if(Date.now()-p.lastShot>rate){
      p.lastShot=Date.now();
      if(pi===0) sfxBlast(p.blvl);
      bl.oy.forEach(oy=>bullets.push({x:p.x+44,y:p.y+oy,spd:bl.spd,sz:bl.sz,dmg:bl.dmg*p.dmg,col:bl.color,pidx:pi}));
    }
  });

  // Touch follows P1 — snap directly to finger (instant response on all screen sizes)
  if(touchActive&&players[0]?.alive){
    const rect=C.getBoundingClientRect();
    const p=players[0];
    if(touchY!==null){ const cy=(touchY-rect.top)*(GH/rect.height)-70; p.y=Math.max(35,Math.min(PLAY_H-35,cy)); }
    if(touchX!==null){ const cx=(touchX-rect.left)*(GW/rect.width); p.x=Math.max(50,Math.min(GW*.55,cx)); }
  }

  bullets=bullets.filter(b=>b.x<GW+30);bullets.forEach(b=>b.x+=b.spd);
  eBullets=eBullets.filter(b=>b.x>-20&&b.y>-20&&b.y<PLAY_H+20);eBullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
  const si=Math.max(22,80-Math.floor(gameT/8)*6);eTimer++;if(eTimer>=si){eTimer=0;spawnEnemy();if(vel>2.5)spawnEnemy();}
  enemies=enemies.filter(e=>e.x>-100);
  enemies.forEach(e=>{
    e.x-=Math.min(e.spd*(vel*.55),20);e.sT--;
    if(e.sT<=0){
      e.sT=50+Math.random()*70;
      const alive=players.filter(p=>p.alive);
      if(alive.length>0){
        let tgt=alive[0],md=Infinity;
        alive.forEach(p=>{const d=Math.hypot(e.x-p.x,e.y-p.y);if(d<md){md=d;tgt=p;}});
        const dx=tgt.x-e.x,dy=tgt.y-e.y,d=Math.sqrt(dx*dx+dy*dy)||1;
        eBullets.push({x:e.x,y:e.y,vx:(dx/d)*4.5,vy:(dy/d)*4.5});
      }
    }
  });
  bullets.forEach(b=>{enemies.forEach(e=>{const hw=e.type===2?36:e.type===1?30:14;if(Math.abs(b.x-e.x)<hw&&Math.abs(b.y-e.y)<22){e.hp-=b.dmg;b.x=GW+9999;burst(b.x,b.y,b.col,5);if(e.hp<=0){burst(e.x,e.y,e.type===0?'#818cf8':e.type===1?'#f472b6':'#34d399',18);sfxExplode();score+=e.type===0?10:e.type===1?20:30;screensDestroyed++;if(screensDestroyed%10===0){spawnHP();hpWarning=75;}if(Math.random()<.15&&maxBlvl<BLASTERS.length-1)pups.push({x:e.x,y:e.y,lv:Math.min(maxBlvl+1,BLASTERS.length-1),life:280,pidx:b.pidx??0});e.hp=-9999;}}});});
  enemies=enemies.filter(e=>e.hp>-1000);
  pups=pups.filter(p=>p.life>0);
  pups.forEach(pu=>{pu.x-=1.2;pu.life--;players.forEach((p,pi)=>{if(!p.alive||pu.life<=0)return;if(Math.abs(pu.x-p.x)<32&&Math.abs(pu.y-p.y)<32){p.blvl=pu.lv;sfxPowerup();burst(pu.x,pu.y,BLASTERS[pu.lv].color,22);pu.life=0;}});});
  updateChains();
  updateHPItems();
  updateDowngradeNodes();
  // Boss spawn: around 220s, player must have blvl>2 and not already spawned
  if(!bossSpawned&&gameT>220){
    const maxBlvl=Math.max(...players.map(p=>p.blvl));
    if(maxBlvl>2){bossSpawned=true;bossWarning=180;setTimeout(spawnBoss,3000);}
  }
  if(bossWarning>0) bossWarning--;
  if(boss&&boss.alive) updateBoss();
  if(blackHole) checkBlackHole();
  players.forEach((p,pi)=>{
    if(!p.alive||p.inv>0) return;
    eBullets.forEach(b=>{if(Math.abs(b.x-p.x)<26&&Math.abs(b.y-p.y)<30){b.x=-9999;hitPlayer(pi);}});
    enemies.forEach(e=>{if(Math.abs(e.x-p.x)<40&&Math.abs(e.y-p.y)<40){e.hp=-9999;hitPlayer(pi);}});
  });
  if(unlockFlash>0)unlockFlash--;
}

function hitPlayer(pidx){
  const p=players[pidx]; if(!p||!p.alive) return;

function drawIntro(){
  introT+=1/60;
  const t=introT, DUR=6;
  X.fillStyle='#000'; X.fillRect(0,0,GW,GH);

  // Video if available, else Ken Burns JPEG
  if(introVidOK&&introVid.readyState>=2){
    if(introVid.paused) introVid.play();
    const ar=introVid.videoWidth/introVid.videoHeight||.75;
    const dh=GH*1.05,dw=dh*ar;
    X.drawImage(introVid,(GW-dw)/2,(GH-dh)/2,dw,dh);
    if(introVid.ended){STATE='start';return;}
  } else if(introImg.complete&&introImg.naturalWidth>0){
    const ar=introImg.naturalWidth/introImg.naturalHeight;
    const zoom=1+Math.min(t/DUR,1)*.13;
    const panX=Math.min(t/DUR,1)*18;
    const dh=GH*zoom,dw=dh*ar;
    X.drawImage(introImg,(GW-dw)/2-panX,(GH-dh)/2,dw,dh);
  }

  // Vignette
  const vg=X.createRadialGradient(GW/2,GH*.45,GH*.15,GW/2,GH*.45,GH*.9);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,.65)');
  X.fillStyle=vg; X.fillRect(0,0,GW,GH);

  // Fade in from black
  const fi=Math.max(0,1-t*1.8);
  if(fi>0){X.fillStyle=`rgba(0,0,0,${fi})`;X.fillRect(0,0,GW,GH);}

  // Title reveal at t=1.5
  if(t>1.5){
    const ta=Math.min((t-1.5)/.9,1);
    X.globalAlpha=ta;
    X.textAlign='center';
    X.shadowColor='#fbbf24'; X.shadowBlur=45;
    X.fillStyle='#fef08a'; X.font='bold 64px Arial Black';
    X.fillText('HARRIS',GW/2,GH*.42);
    X.shadowColor='#a78bfa'; X.shadowBlur=30;
    X.fillStyle='#fff'; X.font='bold 64px Arial Black';
    X.fillText('ADVENTURES',GW/2,GH*.42+72);
    X.shadowBlur=0; X.globalAlpha=1;
  }
  // Episode subtitle at t=2.8
  if(t>2.8){
    const ta2=Math.min((t-2.8)/.7,1);
    X.globalAlpha=ta2;
    X.fillStyle='#f59e0b'; X.font='bold 13px "Courier New"'; X.textAlign='center';
    X.fillText('EPISODE 1  ·  ARE WE THERE YET?',GW/2,GH*.42+100);
    X.globalAlpha=1;
  }
  // Tap hint blink
  if(t>.8&&Math.floor(t*1.5)%2===0){
    X.fillStyle='rgba(255,255,255,.35)'; X.font='10px "Courier New"'; X.textAlign='center';
    X.fillText('tap to skip',GW/2,GH-14);
  }
  // Fade out at end
  if(t>DUR-1.2){
    const fa=Math.min((t-(DUR-1.2))/1.2,1);
    X.fillStyle=`rgba(0,0,0,${fa})`; X.fillRect(0,0,GW,GH);
  }
  if(t>=DUR) STATE='start';
}

const SP_PAD_BIG_W=114, SP_PAD_BIG_H=82, SP_PAD_BIG_G=8;
const SP_PAD_BIG_X0=(GW-(4*(SP_PAD_BIG_W+SP_PAD_BIG_G)-SP_PAD_BIG_G))/2; // 158

function getSettingsPadBounds(i){
  const col=i%4,row=Math.floor(i/4);
  return {x:SP_PAD_BIG_X0+col*(SP_PAD_BIG_W+SP_PAD_BIG_G), y:172+row*(SP_PAD_BIG_H+SP_PAD_BIG_G)};
}

function handleSettingsTap(cx,cy){
  initAudio();
  // LAUNCH button
  if(cx>=GW-192&&cx<=GW-12&&cy>=GH-54&&cy<=GH-10){ launch(); return; }
  // BACK button
  if(cx>=12&&cx<=152&&cy>=GH-54&&cy<=GH-10){ STATE=gameMode==='2p'?'p2CharSelect':'charSelect'; return; }
  // Beat selector
  if(cx>=GW/2-120&&cx<=GW/2+4&&cy>=164&&cy<=186) switchBeat(0);
  if(cx>=GW/2+4&&cx<=GW/2+124&&cy>=164&&cy<=186&&pchains()>=8) switchBeat(1);
  // Pads
  activeSlots().forEach((_,i)=>{
    const b=getSettingsPadBounds(i);
    if(!activeSlots()[i].unlocked) return; // locked
    if(cx>=b.x&&cx<=b.x+SP_PAD_BIG_W&&cy>=b.y&&cy<=b.y+SP_PAD_BIG_H){
      settingsLoopsOn[i]=!settingsLoopsOn[i];
      settingsLoopsOn[i]?startLoop(i):stopLoop(i);
    }
  });
}

  pups.forEach(drawPup);
  chains.forEach(drawChain);
  downgradeNodes.forEach(drawDowngradeNode);
  hpItems.forEach(drawHPItem);
  if(boss&&boss.alive) drawBoss();
  if(blackHole) drawBlackHole();
  enemies.forEach(drawEnemy);
  bullets.forEach(b=>{
    X.shadowColor=b.col; X.shadowBlur=b.sz>8?32:16;
    for(let t=1;t<=3;t++){X.globalAlpha=(4-t)*.07;X.fillStyle=b.col;const tx=b.x-b.spd*t*.45;if(b.sz>6){X.beginPath();X.arc(tx,b.y,b.sz*(1-t*.12),0,Math.PI*2);X.fill();}else{X.fillRect(tx-b.sz/2,b.y-b.sz/2,b.sz*2.5,b.sz);}}
    X.globalAlpha=1; X.fillStyle=b.col;
    if(b.sz>6){X.beginPath();X.arc(b.x,b.y,b.sz,0,Math.PI*2);X.fill();X.fillStyle='rgba(255,255,255,.55)';X.beginPath();X.arc(b.x-b.sz*.25,b.y-b.sz*.25,b.sz*.3,0,Math.PI*2);X.fill();}
    else{X.fillRect(b.x-b.sz/2,b.y-b.sz/2,b.sz*2.8,b.sz);if(b.sz>=5){X.fillStyle='rgba(255,255,255,.4)';X.fillRect(b.x,b.y-b.sz*.3,b.sz*1.2,b.sz*.5);}}
    X.shadowBlur=0;
  });
  tickParts();
  tickNotifs();
  players.forEach((p,pi)=>{
    if(!p.alive) return;
    const isJude=p.charIdx===0;
    const ecol=isJude?'#f97316':'#38bdf8';
    const rgb=isJude?'249,115,22':'56,189,248';
    X.shadowColor=ecol;X.shadowBlur=25;
    for(let j=0;j<3;j++){X.fillStyle=`rgba(${rgb},.4)`;X.beginPath();X.ellipse(p.x-42,p.y+[-12,0,12][j],22+Math.sin(frame*.18+j+pi)*5,6,0,0,Math.PI*2);X.fill();}
    X.shadowBlur=0;
    if(p.inv>0&&Math.floor(frame/4)%2) X.globalAlpha=.45;
    if(isJude) drawJudeSprite(p.x,p.y); else drawZenSprite(p.x,p.y);
    X.globalAlpha=1;
    // P1/P2 badge in 2P mode
    if(gameMode==='2p'){
      rr(X,p.x-16,p.y+46,32,16,4,ecol+'cc');
      X.fillStyle='#fff';X.font='bold 10px "Courier New"';X.textAlign='center';X.fillText(`P${pi+1}`,p.x,p.y+58);
    }
  });
  drawHUD();
  drawSP404Strip();
}

function drawEliminatedStore(y){
  const ob=obucks(),pc=pchains(),pc2=pchains2(),canBuy=ob>=50&&(pc<8||pc2<8);
  rr(X,10,y,GW/2-16,80,7,'#0a150a','#22c55e',1);
  X.fillStyle='#2a6a2a';X.font='9px "Courier New"';X.textAlign='left';X.fillText('OLYMPIC BUCKS',18,y+16);
  X.shadowColor='#fbbf24';X.shadowBlur=6;X.fillStyle='#fbbf24';X.font='bold 28px "Courier New"';X.fillText(`⊙ ${ob}`,18,y+50);X.shadowBlur=0;
  X.fillStyle='#1a5a1a';X.font='8px "Courier New"';X.fillText('earned blasting screens in-game',18,y+68);
  // Buy chain button
  rr(X,GW/2+6,y,GW/2-16,80,7,canBuy?'rgba(245,158,11,.18)':'rgba(30,30,30,.5)',canBuy?'#f59e0b':'#333',canBuy?2:1);
  X.fillStyle=canBuy?'#fbbf24':'#444';X.font='bold 13px "Courier New"';X.textAlign='center';X.fillText('🔗 BUY CHAIN',GW*3/4,y+22);
  X.fillStyle=canBuy?'#f97316':'#555';X.font='bold 18px "Courier New"';X.fillText('50 OB',GW*3/4,y+46);
  X.fillStyle=pc>=8&&pc2>=8?'#39ff14':canBuy?'#a3e635':'#555';X.font='9px "Courier New"';X.fillText(pc>=8&&pc2>=8?'ALL SLOTS UNLOCKED':pc<8?`Beat1: ${8-pc} left`:canBuy?`Beat2: ${8-pc2} left`:`need ${50-ob} more OB`,GW*3/4,y+66);
  // Slot strip — rapper chain pendants
  const sy=y+90;
  X.fillStyle='#f59e0b';X.font='bold 9px "Courier New"';X.textAlign='left';X.fillText('YOUR CHAIN COLLECTION:',12,sy+12);
  LOOP_SLOTS.forEach((sl,i)=>{
    const sw=(GW-24)/8-3,sx=12+i*(sw+3),unlocked=i<pc;
    rr(X,sx,sy+16,sw,58,4,unlocked?'rgba(245,158,11,.08)':'#0a0a0a',unlocked?'#f59e0b':'#1e1e1e',1);
    drawPendant(sx+sw/2, sy+42, i, unlocked, 10);
    X.fillStyle=unlocked?CHAIN_DESIGNS[i].col:'#2a2a2a';X.font='bold 6px "Courier New"';X.textAlign='center';
    X.fillText(CHAIN_DESIGNS[i].label,sx+sw/2,sy+65);
  });
  X.fillStyle='#2a3a4a';X.font='8px "Courier New"';X.textAlign='center';
  X.fillText('Blast screens to earn OB  ·  every 10 kills = HP boost',GW/2,sy+72);
  if(pchains()>=8){
    const sy2=sy+82;
    X.fillStyle='#e879f9';X.font='bold 9px "Courier New"';X.textAlign='left';X.fillText('BEAT 2 CHAINS — Eb MINOR:',12,sy2+12);
    LOOP_SLOTS2.forEach((sl,i)=>{
      const sw=(GW-24)/8-3,sx=12+i*(sw+3),unlocked=i<pchains2();
      rr(X,sx,sy2+16,sw,58,4,unlocked?'rgba(232,121,249,.08)':'#0a0a0a',unlocked?'#e879f9':'#1e1e1e',1);
      drawPendant(sx+sw/2, sy2+42, i, unlocked, 10);
      X.fillStyle=unlocked?CHAIN_DESIGNS[i].col:'#2a2a2a';X.font='bold 6px "Courier New"';X.textAlign='center';
      X.fillText(CHAIN_DESIGNS[i].label,sx+sw/2,sy2+65);
    });
  }
}

function drawEliminatedSampler(y){
  initAudio();
  const PW=88,PH=66,PG=5,PX0=(GW-(4*(PW+PG)-PG))/2;
  X.fillStyle='#334155';X.font='8px "Courier New"';X.textAlign='center';X.fillText('TAP PADS TO JAM DURING COOLDOWN',GW/2,y+10);
  LOOP_SLOTS.forEach((sl,i)=>{
    const col=i%4,row=Math.floor(i/4);
    const px=PX0+col*(PW+PG),py=y+16+row*(PH+PG);
    const color=SP_PAD_COLORS[i],locked=!sl.unlocked,on=sl.playing;
    rr(X,px,py,PW,PH,7,'#0d0d0d');
    rr(X,px+2,py+2,PW-4,PH-4,6,locked?'#161616':on?color+'cc':color+'22');
    if(on){X.shadowColor=color;X.shadowBlur=16;}
    rr(X,px+4,py+4,PW-8,PH-8,5,locked?'#111':on?color:color+'15');
    X.shadowBlur=0;
    X.beginPath();X.arc(px+PW/2,py+9,3,0,Math.PI*2);X.fillStyle=on?color:locked?'#1c1c1c':'#2a2a2a';X.fill();
    if(on){X.shadowColor=color;X.shadowBlur=8;X.fill();X.shadowBlur=0;}
    X.textAlign='center';
    if(locked){X.fillStyle='#252525';X.font='13px serif';X.fillText('🔒',px+PW/2,py+PH/2+5);X.fillStyle='#2a2a2a';X.font='7px "Courier New"';X.fillText(sl.name,px+PW/2,py+PH-9);}
    else{X.fillStyle=on?'#fff':color;X.font='bold 9px "Courier New"';X.fillText(sl.name,px+PW/2,py+PH/2-4);rr(X,px+PW/2-18,py+PH/2+4,36,14,3,on?color+'44':'#1a1a1a');X.fillStyle=on?color:'#444';X.font='bold 8px "Courier New"';X.fillText(on?'● ON':'○ OFF',px+PW/2,py+PH/2+14);}
    if(on&&Math.floor(frame/10)%2===0){X.shadowColor=color;X.shadowBlur=6;rr(X,px+1,py+1,PW-2,PH-2,7,'',color,1.5);X.shadowBlur=0;}
  });
  const active=activeSlots().filter(s=>s.playing).map(s=>s.name);
  X.fillStyle=active.length?'#39ff14':'#3a3a4a';X.font='9px "Courier New"';X.textAlign='center';
  X.fillText(active.length?`♪  ${active.join(' · ')}`:'No loops active — tap a pad to start',GW/2,y+16+2*(PH+PG)+PH+12);
}

function drawEliminatedBase(){
  X.fillStyle='#06000f';X.fillRect(0,0,GW,GH);drawBG(0);frame++;
  X.fillStyle='rgba(239,68,68,.07)';X.fillRect(0,0,GW,GH);
  const rem=Math.max(0,lockedUntil()-Date.now()),m=Math.floor(rem/60000),s=String(Math.floor((rem%60000)/1000)).padStart(2,'0');
  // Compact header
  X.textAlign='center';
  X.shadowColor='#ef4444';X.shadowBlur=14;X.fillStyle='#ef4444';X.font='bold 24px Arial Black';X.fillText('ELIMINATED',GW/2,20);X.shadowBlur=0;
  X.shadowColor='#fef08a';X.shadowBlur=8;X.fillStyle='#fef08a';X.font='bold 22px Arial Black';X.fillText(rem>0?`${m}:${s}`:"TIME'S UP!",GW/2,44);X.shadowBlur=0;
  X.fillStyle='#475569';X.font='9px "Courier New"';X.fillText(rem>0?'Hang tight — browse below while you wait':'Timer done — tap UNLOCK to play',GW/2,58);
  // Tab nav
  const tw=(GW-20)/3-4;
  [['store','STORE'],['sampler','SAMPLER'],['unlock','UNLOCK CODE']].forEach(([id,label],i)=>{
    const tx=10+i*(tw+4),active=elimTab===id;
    rr(X,tx,66,tw,28,5,active?'rgba(139,92,246,.35)':'rgba(0,0,0,.4)',active?'#8b5cf6':'#2a2a2a',active?2:1);
    X.fillStyle=active?'#e9d5ff':'#555';X.font='bold 11px "Courier New"';X.textAlign='center';X.fillText(label,tx+tw/2,85);
  });
  // Tab content
  if(elimTab==='store')        drawEliminatedStore(100);
  else if(elimTab==='sampler') drawEliminatedSampler(100);
  else                         { KP_Y2=100; drawSP404Keypad(); }
  tickNotifs();
  if(rem<=0&&elimTab!=='unlock') STATE='start';
}

// ═══════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════
function drawEpisode(){
  X.fillStyle='#000';X.fillRect(0,0,GW,GH);
  if(ep1Vid.readyState>=2){
    const ar=ep1Vid.videoWidth/ep1Vid.videoHeight||16/9;
    let dw=GW,dh=GW/ar;
    if(dh>GH){dh=GH;dw=dh*ar;}
    X.drawImage(ep1Vid,(GW-dw)/2,(GH-dh)/2,dw,dh);
  } else {
    X.fillStyle='#222';X.font='bold 14px "Courier New"';X.textAlign='center';X.fillText('Loading episode...',GW/2,GH/2);
  }
  // Pause overlay
  if(ep1Vid.paused&&!ep1Vid.ended){
    X.fillStyle='rgba(0,0,0,.45)';X.fillRect(0,0,GW,GH);
    X.fillStyle='rgba(255,255,255,.85)';X.font='bold 60px Arial';X.textAlign='center';X.fillText('▶',GW/2,GH/2+20);
  }
  // Back button
  rr(X,8,8,100,30,5,'rgba(0,0,0,.75)','#555',1);
  X.fillStyle='#aaa';X.font='bold 11px "Courier New"';X.textAlign='center';X.fillText('◀ BACK',58,28);
  // End of video → back to menu
  if(ep1Vid.ended){ep1Vid.currentTime=0;startBGM();STATE='start';}
}

function drawLevelComplete(){
  X.fillStyle='#02000a';X.fillRect(0,0,GW,GH);drawBG(0);frame++;
  X.fillStyle='rgba(124,58,237,.08)';X.fillRect(0,0,GW,GH);
  // Header
  X.textAlign='center';
  X.shadowColor='#fbbf24';X.shadowBlur=30;X.fillStyle='#fef08a';X.font='bold 34px Arial Black';X.fillText(`LEVEL ${currentLevel-1} COMPLETE`,GW/2,36);X.shadowBlur=0;
  X.shadowColor='#7c3aed';X.shadowBlur=14;X.fillStyle='#c4b5fd';X.font='bold 16px "Courier New"';X.fillText(`▸  ENTERING LEVEL ${currentLevel}`,GW/2,60);X.shadowBlur=0;
  X.fillStyle='#475569';X.font='9px "Courier New"';X.fillText(`FINAL SCORE: ${score}  ·  CHAINS: ${chainsCollected}  ·  OB: ${obucks()}`,GW/2,76);
  // Tabs
  const tw=(GW-20)/3-4;
  [['next','NEXT LEVEL','#22c55e'],['store','STORE','#f59e0b'],['sampler','SAMPLER','#8b5cf6']].forEach(([id,label,col],i)=>{
    const tx=10+i*(tw+4),active=levelCompleteTab===id;
    rr(X,tx,82,tw,28,5,active?col+'33':'rgba(0,0,0,.4)',active?col:'#2a2a2a',active?2:1);
    X.fillStyle=active?'#fff':'#666';X.font='bold 11px "Courier New"';X.textAlign='center';X.fillText(label,tx+tw/2,101);
  });
  // Tab content
  if(levelCompleteTab==='next'){
    // Level selector
    X.fillStyle='#94a3b8';X.font='9px "Courier New"';X.textAlign='center';X.fillText('SELECT LEVEL TO PLAY:',GW/2,132);
    const ml=maxLevel(),cols=Math.min(ml,10),btnW=Math.min(54,(GW-24)/cols-4);
    const startX=(GW-(cols*(btnW+4)-4))/2;
    for(let lv=1;lv<=ml;lv++){
      const col=(lv-1)%10, row=Math.floor((lv-1)/10);
      const bx=startX+col*(btnW+4), by=138+row*42;
      const sel=selectedLevel===lv, isNext=lv===currentLevel;
      const col_=isNext?'#22c55e':lv<currentLevel?'#a78bfa':'#64748b';
      rr(X,bx,by,btnW,32,6,sel?col_+'44':'rgba(0,0,0,.4)',sel?col_:'#333',sel?2:1);
      if(sel){X.shadowColor=col_;X.shadowBlur=12;}
      X.fillStyle=sel?'#fff':col_;X.font=`bold ${btnW>40?'12':'10'}px "Courier New"`;X.textAlign='center';
      X.fillText(`LV ${lv}`,bx+btnW/2,by+21);X.shadowBlur=0;
      if(isNext){X.fillStyle='#39ff14';X.font='7px "Courier New"';X.fillText('NEW',bx+btnW/2,by+31);}
    }
    // Info for selected level
    const infoY=138+Math.ceil(ml/10)*42+8;
    rr(X,GW/2-200,infoY,400,52,8,'rgba(0,0,0,.4)','#334155',1);
    X.fillStyle='#cbd5e1';X.font='bold 11px "Courier New"';X.textAlign='center';
    X.fillText(`LEVEL ${selectedLevel} — Screens take ${selectedLevel}x hits · ${selectedLevel===currentLevel?'NEW LEVEL':'REVISIT'}`,GW/2,infoY+18);
    X.fillStyle='#475569';X.font='9px "Courier New"';
    X.fillText(selectedLevel<currentLevel?'Going back to an easier level — a good way to grind chains & OB':'Boss health and downgrade nodes scale with level',GW/2,infoY+36);
    // Play button
    const playY=infoY+62, btnBlink=Math.floor(Date.now()/500)%2;
    rr(X,GW/2-140,playY,280,52,12,btnBlink?'rgba(34,197,94,.3)':'rgba(34,197,94,.15)','#22c55e',2.5);
    if(btnBlink){X.shadowColor='#22c55e';X.shadowBlur=18;}
    X.fillStyle='#22c55e';X.font='bold 18px "Courier New"';X.textAlign='center';
    X.fillText(`▶  PLAY LEVEL ${selectedLevel}`,GW/2,playY+33);X.shadowBlur=0;
  } else if(levelCompleteTab==='store'){
    drawEliminatedStore(118);
  } else {
    drawEliminatedSampler(118);
  }
  tickNotifs();
}

function handleLevelCompleteTap(cx,cy){
  initAudio();
  const tw=(GW-20)/3-4;
  [['next',0],['store',1],['sampler',2]].forEach(([id,i])=>{
    const tx=10+i*(tw+4);
    if(cx>=tx&&cx<=tx+tw&&cy>=82&&cy<=110) levelCompleteTab=id;
  });
  if(levelCompleteTab==='next'){
    // Level selector buttons
    const ml=maxLevel(),cols=Math.min(ml,10),btnW=Math.min(54,(GW-24)/cols-4);
    const startX=(GW-(cols*(btnW+4)-4))/2;
    for(let lv=1;lv<=ml;lv++){
      const col=(lv-1)%10,row=Math.floor((lv-1)/10);
      const bx=startX+col*(btnW+4),by=138+row*42;
      if(cx>=bx&&cx<=bx+btnW&&cy>=by&&cy<=by+32){ selectedLevel=lv; return; }
    }
    // Play button — dynamic Y based on rows
    const infoY=138+Math.ceil(ml/10)*42+8, playY=infoY+62;
    if(cx>=GW/2-140&&cx<=GW/2+140&&cy>=playY&&cy<=playY+52){
      currentLevel=selectedLevel;
      localStorage.setItem('sb_level',currentLevel);
      launch();
    }
  }
  if(levelCompleteTab==='store'){
    if(cx>=GW/2+6&&cx<=GW-10&&cy>=218&&cy<=298){
      if(buyChain()){sfxPowerup();burst(GW*3/4,258,'#f59e0b',22);addNotif('🔗 CHAIN UNLOCKED!',GW/2,210,'#f59e0b');}
    }
  }
  if(levelCompleteTab==='sampler'){
    const PW=88,PH=66,PG=5,PX0=(GW-(4*(PW+PG)-PG))/2;
    activeSlots().forEach((sl,i)=>{
      if(!sl.unlocked) return;
      const col=i%4,row=Math.floor(i/4);
      const px=PX0+col*(PW+PG),py=136+row*(PH+PG);
      if(cx>=px&&cx<=px+PW&&cy>=py&&cy<=py+PH) toggleLoop(i);
    });
  }
}

function loop(){
  X.textAlign='center';
  if(STATE==='boot')        STATE=lockedUntil()>Date.now()?'lockout':'intro';
  else if(STATE==='intro')         drawIntro();
  else if(STATE==='start')         drawTitle();
  else if(STATE==='charSelect')    drawCharSelect();
  else if(STATE==='p2CharSelect')  drawP2CharSelect();
  else if(STATE==='spSettings')    drawSpSettings();
  else if(STATE==='playing')    {update();drawGame();}
  else if(STATE==='episode')        drawEpisode();
  else if(STATE==='levelComplete')    drawLevelComplete();
  else if(STATE==='eliminated'||STATE==='lockout') drawEliminatedBase();
  requestAnimationFrame(loop);
}
loop();
</script>
